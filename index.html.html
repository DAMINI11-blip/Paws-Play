<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paws & Play 🐾</title>
<style>
/* ============================================================
   TOKENS & RESET
   ============================================================ */
:root {
  --pink:      #FF4D8F;
  --pink-dark: #D63A77;
  --sky:       #00BFFF;
  --sky-dark:  #0099CC;
  --lime:      #3DDA84;
  --lime-dark: #2CB36A;
  --sun:       #FFD93D;
  --sun-dark:  #E6B800;
  --plum:      #7C3AED;
  --plum-dark: #5B21B6;
  --bg:        #FFF5FB;
  --card:      #FFFFFF;
  --text:      #1A1A2E;
  --muted:     #8888AA;
  --radius:    28px;
  --shadow:    0 8px 32px rgba(0,0,0,0.12);
  --shadow-btn:0 6px 0px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Segoe UI',system-ui,sans-serif;
  color:var(--text);
  padding:16px;
  overflow-x:hidden;
}
.hidden{display:none!important}

/* ============================================================
   FLOATING BACKGROUND BUBBLES
   ============================================================ */
.bubbles{
  position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;
}
.bubble{
  position:absolute;border-radius:50%;opacity:.12;animation:floatUp linear infinite;
}
@keyframes floatUp{
  0%{transform:translateY(110vh) scale(0.5);}
  100%{transform:translateY(-10vh) scale(1);}
}

/* ============================================================
   SETUP SCREEN
   ============================================================ */
.setup-wrap{
  position:relative;z-index:1;
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:40px 36px;
  width:100%;max-width:480px;
  text-align:center;
  animation:popIn .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{
  from{transform:scale(0.7);opacity:0}
  to{transform:scale(1);opacity:1}
}
.setup-logo{
  font-size:3.2rem;
  margin-bottom:6px;
}
.setup-wrap h1{
  font-size:1.9rem;font-weight:900;
  background:linear-gradient(135deg,var(--pink),var(--plum));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:4px;
}
.setup-wrap p{
  color:var(--muted);font-size:.9rem;margin-bottom:28px;
}

.name-input{
  width:100%;padding:14px 18px;
  border:2.5px solid #F0E0EE;
  border-radius:14px;font-size:1.05rem;
  outline:none;transition:border-color .25s,box-shadow .25s;
  margin-bottom:22px;
  color:var(--text);
}
.name-input:focus{
  border-color:var(--pink);
  box-shadow:0 0 0 4px rgba(255,77,143,.12);
}
.name-input::placeholder{color:#CCC;}

.section-label{
  font-size:.75rem;font-weight:800;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);
  margin-bottom:12px;text-align:left;
}
.pet-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px;
}
.pet-card{
  border:2.5px solid #F0E0EE;border-radius:18px;
  padding:18px 10px;cursor:pointer;
  transition:all .2s ease;background:#FAFAFA;
  font-weight:700;font-size:.95rem;
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.pet-card-emoji{font-size:2.4rem;}
.pet-card:hover{transform:translateY(-3px);border-color:#DDBBDD;background:#fff;}
.pet-card.selected{
  border-color:var(--pink);background:#FFF0F6;
  box-shadow:0 0 0 3px rgba(255,77,143,.15);
}
.pet-card.selected .pet-card-emoji{
  animation:wiggle .6s ease-in-out;
}
@keyframes wiggle{
  0%,100%{transform:rotate(0)}20%{transform:rotate(-12deg)}60%{transform:rotate(12deg)}80%{transform:rotate(-6deg)}
}

.start-btn{
  width:100%;padding:16px;
  background:var(--pink);color:#fff;
  border:none;border-radius:50px;
  font-size:1.15rem;font-weight:900;
  cursor:pointer;letter-spacing:.02em;
  box-shadow:var(--shadow-btn) var(--pink-dark);
  transition:all .15s;
}
.start-btn:hover{transform:translateY(-2px);filter:brightness(1.05);}
.start-btn:active{transform:translateY(4px);box-shadow:none;}

/* ============================================================
   GAME SCREEN — OUTER SHELL
   ============================================================ */
.game-wrap{
  position:relative;z-index:1;
  width:100%;max-width:420px;
  display:flex;flex-direction:column;gap:14px;
}

/* TOP BAR */
.topbar{
  background:var(--card);border-radius:20px;
  box-shadow:var(--shadow);
  padding:14px 20px;
  display:flex;justify-content:space-between;align-items:center;
}
.pet-identity h2{
  font-size:1.35rem;font-weight:900;line-height:1.1;
}
.pet-identity .type-badge{
  display:inline-block;
  background:linear-gradient(135deg,var(--pink),var(--plum));
  color:#fff;font-size:.65rem;font-weight:800;
  padding:2px 10px;border-radius:20px;
  text-transform:uppercase;letter-spacing:.07em;margin-top:2px;
}
.currency-strip{
  display:flex;flex-direction:column;align-items:flex-end;gap:4px;
  font-size:.82rem;font-weight:700;
}
.coins-display{color:var(--sun-dark);}
.level-display{color:var(--plum);}

/* STATS CARD */
.stats-card{
  background:var(--card);border-radius:22px;
  box-shadow:var(--shadow);padding:18px 20px;
}
.stats-rows{
  display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;
}
.stat-row{display:flex;flex-direction:column;gap:4px;}
.stat-head{
  display:flex;justify-content:space-between;align-items:center;
  font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--text);
}
.stat-val{font-size:.78rem;font-weight:900;color:var(--muted);}
.bar-track{
  height:10px;background:#F0EEF8;border-radius:99px;overflow:hidden;
}
.bar-fill{
  height:100%;border-radius:99px;
  transition:width .45s cubic-bezier(.22,.61,.36,1),background-color .3s;
}
.bar-fill.hunger {background:linear-gradient(90deg,#FF6B6B,#FF4D8F);}
.bar-fill.happiness{background:linear-gradient(90deg,#FFD93D,#FF9F43);}
.bar-fill.energy  {background:linear-gradient(90deg,#00BFFF,#7C3AED);}
.bar-fill.health  {background:linear-gradient(90deg,#3DDA84,#00BFFF);}

/* PET STAGE */
.stage-card{
  background:var(--card);border-radius:26px;
  box-shadow:var(--shadow);
  padding:20px;
  display:flex;flex-direction:column;align-items:center;gap:0;
  position:relative;overflow:hidden;
}
.stage-bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 80%, #FFF0F6 0%, #F8F4FF 60%, transparent 100%);
  pointer-events:none;
}

/* SPEECH BUBBLE */
.bubble-wrap{
  position:relative;z-index:2;
  background:#FFFFFF;
  border:2.5px solid var(--text);
  border-radius:20px;padding:10px 20px;
  font-weight:800;font-size:.92rem;
  text-align:center;
  box-shadow:3px 4px 0 rgba(0,0,0,0.08);
  margin-bottom:14px;
  min-height:44px;display:flex;align-items:center;justify-content:center;
  max-width:280px;
  transition:background .3s;
}
.bubble-wrap::after{
  content:'';position:absolute;
  bottom:-14px;left:50%;transform:translateX(-50%);
  border-width:14px 10px 0;border-style:solid;
  border-color:var(--text) transparent;
}
.bubble-wrap::before{
  content:'';position:absolute;
  bottom:-10px;left:50%;transform:translateX(-50%);
  border-width:10px 7px 0;border-style:solid;
  border-color:#fff transparent;z-index:1;
}

/* PET CANVAS */
.pet-stage{
  position:relative;z-index:2;
  width:200px;height:200px;
  cursor:pointer;
  -webkit-user-select:none;user-select:none;
  transition:filter .2s;
}
.pet-stage:active{filter:brightness(1.08);}
canvas#petCanvas{display:block;}

/* ANIMATION STATES */
.anim-idle   {animation:idleBounce 2.8s ease-in-out infinite;}
.anim-happy  {animation:happyJump  .55s cubic-bezier(.36,.07,.19,.97) 2;}
.anim-angry  {animation:angrySway  .35s ease-in-out infinite;}
.anim-sleepy {animation:sleepSway  3.2s ease-in-out infinite;}
.anim-special{animation:spinFlip   .9s cubic-bezier(.36,.07,.19,.97) forwards;}

@keyframes idleBounce{
  0%,100%{transform:translateY(0) scaleX(1) scaleY(1);}
  45%    {transform:translateY(-12px) scaleX(.97) scaleY(1.04);}
  55%    {transform:translateY(-12px) scaleX(.97) scaleY(1.04);}
}
@keyframes happyJump{
  0%,100%{transform:translateY(0) scale(1);}
  25%    {transform:translateY(-28px) scale(.92,1.1);}
  50%    {transform:translateY(0)    scale(1.08,.94);}
  75%    {transform:translateY(-14px) scale(.95,1.06);}
}
@keyframes angrySway{
  0%,100%{transform:translateX(0) rotate(0deg);}
  25%    {transform:translateX(-9px) rotate(-4deg);}
  75%    {transform:translateX(9px)  rotate(4deg);}
}
@keyframes sleepSway{
  0%,100%{transform:translateY(0) rotate(-3deg);opacity:.85;}
  50%    {transform:translateY(6px) rotate(3deg);opacity:1;}
}
@keyframes spinFlip{
  0%  {transform:rotate(0deg)   scale(1);}
  40% {transform:rotate(200deg) scale(1.3);}
  70% {transform:rotate(340deg) scale(.9);}
  100%{transform:rotate(360deg) scale(1);}
}

/* ACTIONS */
.actions-card{
  background:var(--card);border-radius:22px;
  box-shadow:var(--shadow);padding:16px;
}
.actions-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
  margin-bottom:10px;
}
.btn-act{
  border:none;border-radius:14px;padding:14px 6px 10px;
  font-weight:900;font-size:.75rem;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:all .12s;
}
.btn-act .ico{font-size:1.5rem;line-height:1;}
.btn-act:active{transform:translateY(4px);box-shadow:none!important;}

.btn-feed{
  background:#FF6B6B;color:#fff;
  box-shadow:var(--shadow-btn) #CC4444;
}
.btn-play{
  background:var(--sun);color:#7A5000;
  box-shadow:var(--shadow-btn) var(--sun-dark);
}
.btn-sleep{
  background:var(--sky);color:#fff;
  box-shadow:var(--shadow-btn) var(--sky-dark);
}
.btn-heal{
  background:var(--lime);color:#fff;
  box-shadow:var(--shadow-btn) var(--lime-dark);
}
.btn-act:hover{transform:translateY(-2px);filter:brightness(1.05);}
.btn-act:active{transform:translateY(4px);}

.btn-reset{
  width:100%;border:2px solid #EEE;background:#FAFAFA;
  color:var(--muted);border-radius:12px;
  padding:11px;font-size:.8rem;font-weight:700;
  cursor:pointer;transition:all .2s;
}
.btn-reset:hover{border-color:#DDD;color:#666;background:#F5F5F5;}

/* MOOD INDICATOR STRIP */
.mood-strip{
  background:var(--card);border-radius:18px;
  box-shadow:var(--shadow);
  padding:12px 20px;
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-weight:800;font-size:.9rem;
}
.mood-icon{font-size:1.4rem;}
.mood-label{
  background:var(--pink);color:#fff;
  padding:3px 14px;border-radius:20px;
  font-size:.75rem;font-weight:900;letter-spacing:.05em;
}

/* RESPONSIVE */
@media(max-width:440px){
  .setup-wrap,.game-wrap{padding-bottom:8px;}
  .setup-wrap{padding:28px 20px;}
  .actions-grid{grid-template-columns:repeat(2,1fr);}
  .stats-rows{grid-template-columns:1fr;}
}

/* ============================================================
   BLINKING ZZZ / HEARTS PARTICLES
   ============================================================ */
.float-particle{
  position:absolute;pointer-events:none;font-size:1.2rem;
  animation:floatParticle 1.4s ease-out forwards;z-index:10;
}
@keyframes floatParticle{
  0%{opacity:1;transform:translateY(0) scale(1);}
  100%{opacity:0;transform:translateY(-70px) scale(.5);}
}
</style>
</head>
<body>

<!-- FLOATING BACKGROUND BUBBLES -->
<div class="bubbles" id="bubbles"></div>

<!-- ============================================================
     SETUP SCREEN
     ============================================================ -->
<div id="setupScreen" class="setup-wrap">
  <div class="setup-logo">🐾</div>
  <h1>Paws & Play</h1>
  <p>Adopt your very own digital companion!</p>

  <input class="name-input" id="petNameInput" type="text"
    placeholder="Name your pet..." maxlength="12" autocomplete="off">

  <div class="section-label">Choose your pet</div>
  <div class="pet-grid" id="petGrid">
    <div class="pet-card selected" data-type="Cat">
      <span class="pet-card-emoji">🐱</span>
      <span>Cat</span>
    </div>
    <div class="pet-card" data-type="Dog">
      <span class="pet-card-emoji">🐶</span>
      <span>Dog</span>
    </div>
    <div class="pet-card" data-type="Parrot">
      <span class="pet-card-emoji">🦜</span>
      <span>Parrot</span>
    </div>
    <div class="pet-card" data-type="Lion">
      <span class="pet-card-emoji">🦁</span>
      <span>Lion</span>
    </div>
  </div>

  <button class="start-btn" id="startBtn">Adopt Pet 🐾</button>
</div>

<!-- ============================================================
     GAME SCREEN
     ============================================================ -->
<div id="gameScreen" class="game-wrap hidden">

  <!-- TOP META BAR -->
  <div class="topbar">
    <div class="pet-identity">
      <h2 id="displayName">Buddy</h2>
      <div class="type-badge" id="displayType">Cat</div>
    </div>
    <div class="currency-strip">
      <div class="coins-display">🪙 <span id="statCoins">50</span> coins</div>
      <div class="level-display">✨ Level <span id="statLevel">1</span></div>
    </div>
  </div>

  <!-- STATS CARD -->
  <div class="stats-card">
    <div class="stats-rows">
      <div class="stat-row">
        <div class="stat-head">🍖 Hunger <span class="stat-val" id="valHunger">100</span></div>
        <div class="bar-track"><div class="bar-fill hunger" id="barHunger" style="width:100%"></div></div>
      </div>
      <div class="stat-row">
        <div class="stat-head">😊 Happy <span class="stat-val" id="valHappiness">100</span></div>
        <div class="bar-track"><div class="bar-fill happiness" id="barHappiness" style="width:100%"></div></div>
      </div>
      <div class="stat-row">
        <div class="stat-head">⚡ Energy <span class="stat-val" id="valEnergy">100</span></div>
        <div class="bar-track"><div class="bar-fill energy" id="barEnergy" style="width:100%"></div></div>
      </div>
      <div class="stat-row">
        <div class="stat-head">❤️ Health <span class="stat-val" id="valHealth">100</span></div>
        <div class="bar-track"><div class="bar-fill health" id="barHealth" style="width:100%"></div></div>
      </div>
    </div>
  </div>

  <!-- MOOD STRIP -->
  <div class="mood-strip">
    <span class="mood-icon" id="moodIcon">😊</span>
    <span id="moodLabel" class="mood-label">HAPPY</span>
  </div>

  <!-- PET STAGE -->
  <div class="stage-card">
    <div class="stage-bg"></div>
    <div class="bubble-wrap" id="speechBubble">Hi! Pet me! 🥰</div>
    <div class="pet-stage anim-idle" id="petStage">
      <canvas id="petCanvas" width="200" height="200"></canvas>
    </div>
  </div>

  <!-- ACTION BUTTONS -->
  <div class="actions-card">
    <div class="actions-grid">
      <button class="btn-act btn-feed" id="btnFeed">
        <span class="ico">🍖</span>Feed
      </button>
      <button class="btn-act btn-play" id="btnPlay">
        <span class="ico">🧸</span>Play
      </button>
      <button class="btn-act btn-sleep" id="btnSleep">
        <span class="ico">💤</span>Sleep
      </button>
      <button class="btn-act btn-heal" id="btnHeal">
        <span class="ico">💊</span>Heal
      </button>
    </div>
    <button class="btn-reset" id="btnReset">🔄 Abandon &amp; Start Over</button>
  </div>

</div>

<script>
/* ================================================================
   CONSTANTS & STATE
   ================================================================ */
const SAVE_KEY = "vpw_save_v3";

let pet = {
  name:"",type:"Cat",
  hunger:100,happiness:100,energy:100,health:100,
  mood:"Happy",
  coins:50,xp:0,level:1,
  // blink state for canvas animation
  blinkTimer:0
};

let selectedType = "Cat";
let tickInterval = null;
let animResetTimer = null;
let canvasAnimFrame = null;
let blinkPhase = 0; // 0=open,1=closing,2=closed,3=opening
let blinkCounter = 0;
let blinkCycle = 120; // frames until next blink

// Canvas blink state (0=fully open, 1=fully closed)
let eyeClose = 0;
let eyeTarget = 0;
let eyeDir = 0;

/* ================================================================
   DOM REFS
   ================================================================ */
const setupScreen   = document.getElementById('setupScreen');
const gameScreen    = document.getElementById('gameScreen');
const petNameInput  = document.getElementById('petNameInput');
const startBtn      = document.getElementById('startBtn');
const petGridEl     = document.getElementById('petGrid');

const displayName   = document.getElementById('displayName');
const displayType   = document.getElementById('displayType');
const speechBubble  = document.getElementById('speechBubble');
const petStage      = document.getElementById('petStage');
const petCanvas     = document.getElementById('petCanvas');
const ctx           = petCanvas.getContext('2d');

const statCoins     = document.getElementById('statCoins');
const statLevel     = document.getElementById('statLevel');
const moodIcon      = document.getElementById('moodIcon');
const moodLabel     = document.getElementById('moodLabel');

/* ================================================================
   FLOATING BACKGROUND BUBBLES (decorative)
   ================================================================ */
(function spawnBubbles(){
  const container = document.getElementById('bubbles');
  const colors = ['#FF4D8F','#00BFFF','#3DDA84','#FFD93D','#7C3AED'];
  for(let i=0;i<18;i++){
    const b = document.createElement('div');
    b.className='bubble';
    const s = 20+Math.random()*60;
    b.style.cssText=`
      width:${s}px;height:${s}px;
      background:${colors[i%colors.length]};
      left:${Math.random()*100}%;
      animation-duration:${6+Math.random()*10}s;
      animation-delay:${-Math.random()*12}s;
    `;
    container.appendChild(b);
  }
})();

/* ================================================================
   PET SELECTION
   ================================================================ */
petGridEl.querySelectorAll('.pet-card').forEach(card=>{
  card.addEventListener('click',()=>{
    petGridEl.querySelectorAll('.pet-card').forEach(c=>c.classList.remove('selected'));
    card.classList.add('selected');
    selectedType = card.dataset.type;
  });
});

startBtn.addEventListener('click',()=>{
  const nm = petNameInput.value.trim();
  if(!nm){ petNameInput.focus(); petNameInput.style.borderColor='#FF4D8F'; return; }
  pet.name=nm; pet.type=selectedType;
  pet.hunger=100; pet.happiness=100; pet.energy=100; pet.health=100;
  pet.mood="Happy"; pet.coins=50; pet.xp=0; pet.level=1;
  saveState();
  launchGame();
});
petNameInput.addEventListener('input',()=>petNameInput.style.borderColor='');

/* ================================================================
   STORAGE
   ================================================================ */
function saveState(){ localStorage.setItem(SAVE_KEY,JSON.stringify(pet)); }
function loadState(){
  try{
    const d=JSON.parse(localStorage.getItem(SAVE_KEY)||'null');
    if(d&&d.name){pet=Object.assign(pet,d);return true;}
  }catch(e){}
  return false;
}

/* ================================================================
   GAME LAUNCH
   ================================================================ */
function launchGame(){
  setupScreen.classList.add('hidden');
  gameScreen.classList.remove('hidden');
  displayName.textContent = pet.name;
  displayType.textContent = pet.type;
  statCoins.textContent   = pet.coins;
  statLevel.textContent   = pet.level;
  updateUI();
  setAnim('anim-idle');
  clearInterval(tickInterval);
  tickInterval = setInterval(gameTick,5000);
  cancelAnimationFrame(canvasAnimFrame);
  drawLoop();
}

/* ================================================================
   GAME TICK — decay every 5 seconds
   ================================================================ */
function gameTick(){
  pet.hunger    = Math.max(0, pet.hunger    - 7);
  pet.happiness = Math.max(0, pet.happiness - 5);
  pet.energy    = Math.max(0, pet.energy    - 6);

  // Health damage / regen
  let dmg=0;
  if(pet.hunger<20)    dmg+=5;
  if(pet.energy<15)    dmg+=3;
  if(pet.happiness<20) dmg+=2;
  if(dmg>0){
    pet.health=Math.max(0,pet.health-dmg);
  } else if(pet.hunger>60&&pet.energy>50){
    pet.health=Math.min(100,pet.health+2);
  }

  recalcMood();
  updateUI();
  saveState();
}

/* ================================================================
   MOOD ENGINE
   ================================================================ */
const MOOD_DATA = {
  Happy:  { icon:'😊', color:'#FF4D8F', anim:'anim-idle',
            speeches:["Living the good life! 🌟","Let's play! 🎉","I love you! 💕","This is great!"] },
  Hungry: { icon:'😋', color:'#FF9F43', anim:'anim-angry',
            speeches:["Feed me! 🍖","My tummy is growling!","I'm so hungry! 😭","Food... please?"] },
  Sleepy: { icon:'😴', color:'#00BFFF', anim:'anim-sleepy',
            speeches:["Yawn... sleepy...💤","Need nap... zzz","So tired...😴","Carry me to bed!"] },
  Sick:   { icon:'🤒', color:'#3DDA84', anim:'anim-sleepy',
            speeches:["I don't feel well 🤒","Ouch... everything hurts","Need medicine 💊","Help me..."] },
  Angry:  { icon:'😠', color:'#FF4D8F', anim:'anim-angry',
            speeches:["Pay attention to me! 😤","I'm bored! 😡","Play with me NOW!","Hmph! 💢"] },
};

function recalcMood(){
  if(pet.health<35)      pet.mood="Sick";
  else if(pet.hunger<30) pet.mood="Hungry";
  else if(pet.energy<30) pet.mood="Sleepy";
  else if(pet.happiness<30) pet.mood="Angry";
  else pet.mood="Happy";
}

/* ================================================================
   UI UPDATE
   ================================================================ */
function updateUI(){
  // Bars
  ['hunger','happiness','energy','health'].forEach(k=>{
    document.getElementById('val'+cap(k)).textContent = pet[k];
    document.getElementById('bar'+cap(k)).style.width  = pet[k]+'%';
  });
  // Mood strip
  const m = MOOD_DATA[pet.mood]||MOOD_DATA.Happy;
  moodIcon.textContent  = m.icon;
  moodLabel.textContent = pet.mood.toUpperCase();
  moodLabel.style.background = m.color;
  // Anim (only if not in a transient state)
  if(!petStage.classList.contains('anim-happy')&&!petStage.classList.contains('anim-special')){
    setAnim(m.anim);
    setSpeech(m.speeches[Math.floor(Math.random()*m.speeches.length)]);
  }
  statCoins.textContent = pet.coins;
  statLevel.textContent = pet.level;
}

function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function setSpeech(txt){ speechBubble.textContent=txt; }

/* ================================================================
   ANIMATION CONTROLLER
   ================================================================ */
function setAnim(cls){
  if(petStage.className.includes(cls)) return;
  petStage.className='pet-stage';
  void petStage.offsetWidth;
  petStage.classList.add(cls);
}

/* ================================================================
   DRAW LOOP — smooth canvas animation at ~60fps
   ================================================================ */
function drawLoop(){
  updateBlink();
  drawPet(eyeClose);
  canvasAnimFrame = requestAnimationFrame(drawLoop);
}

function updateBlink(){
  blinkCounter++;
  if(blinkCounter>=blinkCycle&&eyeClose===0){
    eyeClose=0; eyeTarget=1; blinkCycle=80+Math.random()*120;
    blinkCounter=0;
  }
  if(eyeTarget===1&&eyeClose<1)  eyeClose=Math.min(1,eyeClose+0.15);
  if(eyeClose>=1)                eyeTarget=0;
  if(eyeTarget===0&&eyeClose>0)  eyeClose=Math.max(0,eyeClose-0.18);
}

/* ================================================================
   PET DRAWING ENGINE
   ================================================================ */
function drawPet(blink){
  ctx.clearRect(0,0,200,200);
  const cx=100,cy=108;

  const palettes = {
    Cat:   {body:'#FFCC80',inner:'#FFF3E0',ear:'#FFC0CB',eye:'#2C3E50',nose:'#FF8FAB',tongue:'#FF4D4D'},
    Dog:   {body:'#D4A96A',inner:'#FAEBD7',ear:'#B5865A',eye:'#1A1A2E',nose:'#1A1A2E',tongue:'#FF6B6B'},
    Parrot:{body:'#4CAF50',inner:'#A5D6A7',ear:'#FF5722',eye:'#1A1A2E',nose:'#FFD93D',tongue:'#FF5252'},
    Lion:  {body:'#FFC107',inner:'#FFE082',ear:'#FF9800',eye:'#1A1A2E',nose:'#E91E63',tongue:'#E53935'},
  };
  const p = palettes[pet.type]||palettes.Cat;

  // ---- LION MANE ----
  if(pet.type==='Lion'){
    const gradient=ctx.createRadialGradient(cx,cy,30,cx,cy,72);
    gradient.addColorStop(0,'#FF8F00');
    gradient.addColorStop(1,'#E65100');
    ctx.fillStyle=gradient;
    ctx.beginPath();
    ctx.arc(cx,cy,72,0,Math.PI*2);
    ctx.fill();
    // mane texture spikes
    ctx.fillStyle='#BF360C';
    for(let i=0;i<12;i++){
      const a=i*(Math.PI*2/12);
      ctx.save();ctx.translate(cx,cy);ctx.rotate(a);
      ctx.beginPath();ctx.moveTo(0,50);ctx.lineTo(-7,68);ctx.lineTo(7,68);
      ctx.closePath();ctx.fill();ctx.restore();
    }
  }

  // ---- DOG EARS (floppy) ----
  if(pet.type==='Dog'){
    ctx.fillStyle=p.ear;
    // left floppy ear
    ctx.save();ctx.translate(65,cy-15);ctx.rotate(-0.2);
    ctx.beginPath();ctx.ellipse(0,18,14,32,0,0,Math.PI*2);ctx.fill();ctx.restore();
    // right floppy ear
    ctx.save();ctx.translate(135,cy-15);ctx.rotate(0.2);
    ctx.beginPath();ctx.ellipse(0,18,14,32,0,0,Math.PI*2);ctx.fill();ctx.restore();
  }

  // ---- CAT / LION EARS ----
  if(pet.type==='Cat'||pet.type==='Lion'){
    const earC = pet.type==='Cat'?p.body:'#E65100';
    const innerC= pet.type==='Cat'?p.ear:'#FF8F00';
    // left ear
    ctx.fillStyle=earC;
    ctx.beginPath();ctx.moveTo(62,cy-35);ctx.lineTo(42,cy-72);ctx.lineTo(88,cy-55);ctx.closePath();ctx.fill();
    ctx.fillStyle=innerC;
    ctx.beginPath();ctx.moveTo(65,cy-40);ctx.lineTo(50,cy-62);ctx.lineTo(82,cy-52);ctx.closePath();ctx.fill();
    // right ear
    ctx.fillStyle=earC;
    ctx.beginPath();ctx.moveTo(138,cy-35);ctx.lineTo(158,cy-72);ctx.lineTo(112,cy-55);ctx.closePath();ctx.fill();
    ctx.fillStyle=innerC;
    ctx.beginPath();ctx.moveTo(135,cy-40);ctx.lineTo(150,cy-62);ctx.lineTo(118,cy-52);ctx.closePath();ctx.fill();
  }

  // ---- PARROT CREST ----
  if(pet.type==='Parrot'){
    const crestColors=['#FF5722','#FF9800','#FFC107'];
    for(let i=0;i<3;i++){
      ctx.fillStyle=crestColors[i];
      ctx.save();ctx.translate(cx,cy-45);
      ctx.rotate((i-1)*0.25);
      ctx.beginPath();ctx.ellipse(0,-18+i*2,5,18,0,0,Math.PI*2);ctx.fill();ctx.restore();
    }
  }

  // ---- MAIN HEAD ----
  const headGrad=ctx.createRadialGradient(cx-15,cy-20,5,cx,cy,52);
  headGrad.addColorStop(0,'#fff');
  headGrad.addColorStop(0.3,p.body);
  headGrad.addColorStop(1,shadeColor(p.body,-20));
  ctx.fillStyle=headGrad;
  ctx.beginPath();ctx.arc(cx,cy,52,0,Math.PI*2);ctx.fill();

  // ---- CHEEK FLUSH ----
  ctx.fillStyle='rgba(255,150,150,0.25)';
  ctx.beginPath();ctx.ellipse(cx-28,cy+10,14,9,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+28,cy+10,14,9,0,0,Math.PI*2);ctx.fill();

  // ---- FACE EXPRESSION ----
  drawFace(cx,cy,blink,p);

  // ---- SPECIES DETAILS ----
  if(pet.type==='Cat'){
    // whiskers
    ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.lineWidth=1.5;
    const wPts=[[cx-18,cy+8,cx-52,cy+2],[cx-18,cy+14,cx-52,cy+14],
                [cx+18,cy+8,cx+52,cy+2],[cx+18,cy+14,cx+52,cy+14]];
    wPts.forEach(([x1,y1,x2,y2])=>{
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    });
  }
  if(pet.type==='Parrot'){
    // beak
    ctx.fillStyle='#FFD93D';
    ctx.beginPath();ctx.moveTo(cx-9,cy+5);ctx.lineTo(cx+9,cy+5);ctx.lineTo(cx,cy+22);ctx.closePath();ctx.fill();
    ctx.strokeStyle='#E6B800';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx-9,cy+5);ctx.lineTo(cx+9,cy+5);ctx.lineTo(cx,cy+22);ctx.closePath();ctx.stroke();
  }
}

function drawFace(cx,cy,blink,p){
  // eye params
  const eyeY = cy-4;
  const eyeOH = 9;  // open height
  const eyeH  = Math.max(0.5, eyeOH*(1-blink));

  switch(pet.mood){
    case 'Happy':
      drawNormalEyes(cx,cy,blink,p,eyeOH,true);
      drawSmile(cx,cy,p);
      break;
    case 'Hungry':
      drawRoundEyes(cx,cy,blink,p,8);
      drawOpenMouth(cx,cy,p);
      break;
    case 'Sleepy':
      drawHalfEyes(cx,cy,p);
      drawSmile(cx,cy,p,true);
      // ZZZ
      ctx.fillStyle='#7C3AED';
      ctx.font='bold 14px Segoe UI';
      ctx.fillText('z',cx+44,cy-30);
      ctx.font='bold 10px Segoe UI';
      ctx.fillText('z',cx+52,cy-42);
      ctx.font='bold 7px Segoe UI';
      ctx.fillText('z',cx+58,cy-52);
      break;
    case 'Sick':
      drawXEyes(cx,cy,p);
      drawSadMouth(cx,cy,p);
      // swirls
      ctx.strokeStyle='#3DDA84';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(cx-26,eyeY,6,0,Math.PI*1.5);ctx.stroke();
      ctx.beginPath();ctx.arc(cx+26,eyeY,6,0,Math.PI*1.5);ctx.stroke();
      break;
    case 'Angry':
      drawAngryEyes(cx,cy,p);
      drawAngryMouth(cx,cy,p);
      // anger vein
      ctx.strokeStyle='#FF4D4D';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(cx+36,cy-30);ctx.lineTo(cx+44,cy-38);
      ctx.lineTo(cx+40,cy-34);ctx.lineTo(cx+48,cy-38);ctx.stroke();
      break;
    default:
      drawNormalEyes(cx,cy,blink,p,eyeOH,true);
      drawSmile(cx,cy,p);
  }

  // NOSE (shared)
  if(pet.type!=='Parrot'){
    ctx.fillStyle=p.nose;
    ctx.beginPath();
    ctx.arc(cx,cy+12,pet.type==='Cat'?4:6,0,Math.PI*2);
    ctx.fill();
  }
}

function drawNormalEyes(cx,cy,blink,p,eOH,shine){
  const eyeY=cy-4, eyeH=Math.max(0.5,eOH*(1-blink));
  // Whites
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(cx-24,eyeY,10,eOH,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+24,eyeY,10,eOH,0,0,Math.PI*2);ctx.fill();
  // Pupils
  const pupilH=Math.max(0.5,7*(1-blink));
  ctx.fillStyle=p.eye;
  ctx.beginPath();ctx.ellipse(cx-24,eyeY,6,pupilH,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+24,eyeY,6,pupilH,0,0,Math.PI*2);ctx.fill();
  // Shine
  if(shine&&blink<0.5){
    ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.beginPath();ctx.ellipse(cx-21,eyeY-3,2.5,2,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx+27,eyeY-3,2.5,2,0,0,Math.PI*2);ctx.fill();
  }
}

function drawRoundEyes(cx,cy,blink,p,r){
  const eyeY=cy-4;
  const rr=Math.max(0.5,r*(1-blink));
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(cx-24,eyeY,r,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+24,eyeY,r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=p.eye;
  ctx.beginPath();ctx.arc(cx-24,eyeY,rr,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+24,eyeY,rr,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(cx-21,eyeY-2.5,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+27,eyeY-2.5,2,0,Math.PI*2);ctx.fill();
}

function drawHalfEyes(cx,cy,p){
  const eyeY=cy-4;
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(cx-24,eyeY,10,9,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+24,eyeY,10,9,0,0,Math.PI*2);ctx.fill();
  // heavy lids
  ctx.fillStyle='rgba(180,200,230,0.85)';
  ctx.fillRect(cx-34,eyeY-9,20,10);
  ctx.fillRect(cx+14,eyeY-9,20,10);
  ctx.fillStyle=p.eye;
  ctx.beginPath();ctx.ellipse(cx-24,eyeY+2,6,4,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+24,eyeY+2,6,4,0,0,Math.PI*2);ctx.fill();
}

function drawXEyes(cx,cy,p){
  const eyeY=cy-4;
  ctx.strokeStyle=p.eye;ctx.lineWidth=3;
  ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(cx-30,eyeY-6);ctx.lineTo(cx-18,eyeY+6);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-18,eyeY-6);ctx.lineTo(cx-30,eyeY+6);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+18,eyeY-6);ctx.lineTo(cx+30,eyeY+6);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+30,eyeY-6);ctx.lineTo(cx+18,eyeY+6);ctx.stroke();
}

function drawAngryEyes(cx,cy,p){
  const eyeY=cy-4;
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(cx-24,eyeY,10,9,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+24,eyeY,10,9,0,0,Math.PI*2);ctx.fill();
  // angled brows
  ctx.strokeStyle=p.eye;ctx.lineWidth=3.5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(cx-34,eyeY-11);ctx.lineTo(cx-14,eyeY-7);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+14,eyeY-7);ctx.lineTo(cx+34,eyeY-11);ctx.stroke();
  ctx.fillStyle=p.eye;
  ctx.beginPath();ctx.ellipse(cx-24,eyeY+1,6,6,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+24,eyeY+1,6,6,0,0,Math.PI*2);ctx.fill();
}

function drawSmile(cx,cy,p,small){
  ctx.strokeStyle='#1A1A2E';ctx.lineWidth=2.5;ctx.lineCap='round';
  if(small){
    ctx.beginPath();ctx.arc(cx,cy+26,6,0,Math.PI,false);ctx.stroke();
    return;
  }
  // happy grin with tongue
  ctx.fillStyle='#1A1A2E';
  ctx.beginPath();ctx.arc(cx,cy+22,14,0,Math.PI,false);ctx.fill();
  ctx.fillStyle='#FF6B6B';
  ctx.beginPath();ctx.ellipse(cx,cy+28,9,7,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.moveTo(cx-14,cy+22);ctx.lineTo(cx+14,cy+22);ctx.arc(cx,cy+22,14,0,Math.PI,false);ctx.fill();
  ctx.fillStyle='#FF4D4D';
  ctx.beginPath();ctx.arc(cx,cy+28,8,0,Math.PI,false);ctx.fill();
  // teeth
  ctx.fillStyle='#fff';
  ctx.fillRect(cx-10,cy+22,9,7);
  ctx.fillRect(cx+1,cy+22,9,7);
  ctx.strokeStyle='#ddd';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx,cy+22);ctx.lineTo(cx,cy+29);ctx.stroke();
}

function drawOpenMouth(cx,cy,p){
  ctx.fillStyle='#1A1A2E';
  ctx.beginPath();ctx.arc(cx,cy+24,12,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#D84040';
  ctx.beginPath();ctx.arc(cx,cy+24,9,0,Math.PI*2);ctx.fill();
}

function drawSadMouth(cx,cy,p){
  ctx.strokeStyle='#1A1A2E';ctx.lineWidth=2.5;ctx.lineCap='round';
  ctx.beginPath();ctx.arc(cx,cy+34,8,Math.PI,0,false);ctx.stroke();
}

function drawAngryMouth(cx,cy,p){
  ctx.strokeStyle='#1A1A2E';ctx.lineWidth=3;ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(cx-14,cy+30);
  ctx.bezierCurveTo(cx-7,cy+22,cx+7,cy+22,cx+14,cy+30);
  ctx.stroke();
}

function shadeColor(hex,pct){
  const n=parseInt(hex.slice(1),16);
  let r=Math.min(255,Math.max(0,((n>>16)&0xff)+pct));
  let g=Math.min(255,Math.max(0,((n>>8)&0xff)+pct));
  let b=Math.min(255,Math.max(0,(n&0xff)+pct));
  return `rgb(${r},${g},${b})`;
}

/* ================================================================
   PET INTERACTIONS
   ================================================================ */

// --- CLICK: pet / pats ---
petStage.addEventListener('click',()=>{
  soundEngine.play('click');
  pet.happiness = Math.min(100,pet.happiness+8);
  pet.xp = (pet.xp||0)+5;
  checkLevelUp();

  const sayings={
    Cat:["Meow! 😻","Purrrr~ ❤️","That tickles!","Mrrrow!"],
    Dog:["Woof! 🐾","Bark bark!","Play with me!","*tail wag*"],
    Parrot:["Squawk! Hello!","Polly wants a snack!","Pretty bird!","Awk awk!"],
    Lion:["Roarrr! 🦁","King of the jungle!","Mightyyy nap time","Grrrowl..."],
  };
  const shared=["That tickles! Haha 😂","You're my fave! ❤️","More pets please!","Yay!"];
  const pool=[...(sayings[pet.type]||[]),...shared];
  setSpeech(pool[Math.floor(Math.random()*pool.length)]);

  spawnParticles('heart');
  setAnim('anim-happy');
  updateUI();
  saveState();

  clearTimeout(animResetTimer);
  animResetTimer=setTimeout(()=>{ setAnim('anim-idle'); updateUI(); },1800);
});

// --- DOUBLE CLICK: special trick ---
let lastClick=0;
petStage.addEventListener('click',e=>{
  const now=Date.now();
  if(now-lastClick<350){
    e.stopImmediatePropagation();
    soundEngine.play('dblclick');
    speechBubble.textContent="⭐ SUPER FLIP! ⭐";
    setAnim('anim-special');
    pet.happiness=Math.min(100,pet.happiness+15);
    pet.coins=(pet.coins||0)+3;
    spawnParticles('star');
    updateUI();saveState();
    clearTimeout(animResetTimer);
    animResetTimer=setTimeout(()=>{ setAnim('anim-idle');updateUI(); },1600);
  }
  lastClick=now;
});

/* ================================================================
   ACTION BUTTONS
   ================================================================ */
document.getElementById('btnFeed').addEventListener('click',()=>{
  if(pet.hunger>=100){setSpeech("I'm stuffed! 😅");return;}
  pet.hunger=Math.min(100,pet.hunger+28);
  pet.energy=Math.min(100,pet.energy+5);
  setSpeech("Nom nom nom! Yummy! 😋");
  spawnParticles('food');
  doAction();
});

document.getElementById('btnPlay').addEventListener('click',()=>{
  if(pet.energy<20){setSpeech("Too tired to play... 😴");return;}
  pet.happiness=Math.min(100,pet.happiness+28);
  pet.energy=Math.max(0,pet.energy-15);
  setSpeech("Yippeeee! This is so fun! 🎉");
  spawnParticles('star');
  doAction();
});

document.getElementById('btnSleep').addEventListener('click',()=>{
  if(pet.energy>=100){setSpeech("I'm wide awake!");return;}
  pet.energy=Math.min(100,pet.energy+42);
  pet.hunger=Math.max(0,pet.hunger-8);
  setSpeech("Shhh... sleeping... 😴 zzz");
  doAction('anim-sleepy');
});

document.getElementById('btnHeal').addEventListener('click',()=>{
  if(pet.health>=100){setSpeech("Already 100% healthy! 💪");return;}
  pet.health=Math.min(100,pet.health+32);
  setSpeech("Medicine! Tastes like cherries! 💊");
  spawnParticles('heart');
  doAction();
});

document.getElementById('btnReset').addEventListener('click',()=>{
  if(confirm("Abandon your pet and start fresh? All progress lost!")){
    clearInterval(tickInterval);
    cancelAnimationFrame(canvasAnimFrame);
    localStorage.removeItem(SAVE_KEY);
    gameScreen.classList.add('hidden');
    setupScreen.classList.remove('hidden');
    petNameInput.value='';
  }
});

function doAction(anim='anim-happy'){
  recalcMood();
  updateUI();
  setAnim(anim);
  saveState();
  clearTimeout(animResetTimer);
  animResetTimer=setTimeout(()=>{ setAnim('anim-idle');updateUI(); },2200);
}

/* ================================================================
   LEVEL UP
   ================================================================ */
function checkLevelUp(){
  if(pet.xp>=(pet.level*60)){
    pet.xp=0;pet.level++;
    statLevel.textContent=pet.level;
    setSpeech(`LEVEL UP! Now Level ${pet.level}! 🎉`);
    spawnParticles('star');
  }
}

/* ================================================================
   FLOATING PARTICLES
   ================================================================ */
function spawnParticles(type){
  const icons={heart:['❤️','💕','💗'],star:['⭐','✨','🌟'],food:['🍖','🍕','🎂']};
  const pool=icons[type]||icons.heart;
  const stage=document.querySelector('.stage-card');
  for(let i=0;i<4;i++){
    const p=document.createElement('div');
    p.className='float-particle';
    p.textContent=pool[Math.floor(Math.random()*pool.length)];
    p.style.left=(70+Math.random()*60)+'px';
    p.style.top=(60+Math.random()*80)+'px';
    p.style.animationDelay=(i*0.1)+'s';
    stage.appendChild(p);
    setTimeout(()=>p.remove(),1600);
  }
}

/* ================================================================
   AUDIO ENGINE (Web Audio API synthesis)
   ================================================================ */
const soundEngine={
  play(type){
    try{
      const AC=window.AudioContext||window.webkitAudioContext;
      if(!AC)return;
      const ac=new AC();
      const osc=ac.createOscillator();
      const gain=ac.createGain();
      osc.connect(gain);gain.connect(ac.destination);

      // Per-species pitch feel
      const pitchMap={Cat:1.6,Dog:0.75,Parrot:2.4,Lion:0.35};
      const pm=pitchMap[pet.type]||1;

      if(type==='click'){
        osc.type='sine';
        osc.frequency.setValueAtTime(280*pm,ac.currentTime);
        osc.frequency.exponentialRampToValueAtTime(560*pm,ac.currentTime+0.12);
        gain.gain.setValueAtTime(0.09,ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.18);
        osc.start();osc.stop(ac.currentTime+0.18);
      } else {
        osc.type='triangle';
        osc.frequency.setValueAtTime(180*pm,ac.currentTime);
        osc.frequency.linearRampToValueAtTime(900*pm,ac.currentTime+0.28);
        gain.gain.setValueAtTime(0.13,ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.3);
        osc.start();osc.stop(ac.currentTime+0.3);
      }
    }catch(e){}
  }
};

/* ================================================================
   BOOT — load save or show setup
   ================================================================ */
window.addEventListener('DOMContentLoaded',()=>{
  if(loadState()&&pet.name){
    launchGame();
  } else {
    setupScreen.classList.remove('hidden');
  }
});
